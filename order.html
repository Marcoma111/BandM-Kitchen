<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandM Kitchen - 订餐</title>
    <!-- 引入 Flatpickr 日历组件的样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; color: #333; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .lang-btn { padding: 5px 10px; cursor: pointer; background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .menu-container { border: 1px solid #eee; padding: 15px; border-radius: 8px; background: #fafafa; margin-top: 15px; }
        .dish-item { display: flex; align-items: flex-start; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
        .dish-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .dish-item input { margin-top: 4px; margin-right: 10px; }
        .dish-details { flex: 1; }
        .dish-name { font-weight: bold; }
        .dish-desc { font-size: 0.9em; color: #666; margin-top: 2px; }
        .no-menu { color: #999; font-style: italic; }
        button.submit-btn { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        button.submit-btn:hover { background: #218838; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="page-title">BandM Kitchen 点单</h2>
        <button class="lang-btn" id="lang-toggle" onclick="toggleLanguage()">Português</button>
    </div>

    <!-- 1. 顾客基本信息 -->
    <div class="form-group">
        <label id="label-name">您的姓名 / Nome</label>
        <input type="text" id="cust-name" required>
    </div>
    <div class="form-group">
        <label id="label-contact">联系方式 / Contacto (微信/电话)</label>
        <input type="text" id="cust-contact" required>
    </div>

    <!-- 2. 日期选择器 -->
    <div class="form-group">
        <label id="label-date">选择就餐日期 / Escolha a data</label>
        <!-- Flatpickr 会自动绑定到这个输入框 -->
        <input type="text" id="dining-date" placeholder="请选择日期 / Selecione...">
    </div>

    <!-- 3. 动态菜单显示区 -->
    <h3 id="menu-title">今日菜单 / Menu</h3>
    <div class="menu-container" id="menu-box">
        <p class="no-menu" id="text-init">请先选择就餐日期以加载菜单。</p>
    </div>

    <button class="submit-btn" id="btn-submit" onclick="submitOrder()">提交订单 / Enviar Pedido</button>

    <!-- ==================== 脚本部分 ==================== -->
    <!-- 引入 Supabase 官方 JavaScript SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 引入 Flatpickr 日历组件的 JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
        // 配置你的 Supabase 密钥
        const SUPABASE_URL = "https://hxezvumbkwmavphcahcv.supabase.co"; 
        const SUPABASE_ANON_KEY = "bf2CvVkKr5FvuCwj";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 语种状态：'zh' 为中文，'pt' 为葡萄牙语
        let currentLang = 'zh';
        let allDishes = []; // 存储从数据库查出来的原始菜品数据

        // 页面多语言文本字典
        const i18n = {
            zh: {
                title: "BandM Kitchen 点单",
                langBtn: "Português",
                name: "您的姓名",
                contact: "联系方式 (微信/电话)",
                date: "选择就餐日期",
                menu: "今日菜单",
                init: "请先选择就餐日期以加载菜单。",
                empty: "抱歉，该日期暂无公开菜单供应。",
                submit: "提交订单"
            },
            pt: {
                title: "Pedido - BandM Kitchen",
                langBtn: "中文",
                name: "Seu Nome",
                contact: "Contacto (WeChat/Telemóvel)",
                date: "Escolha a data",
                menu: "Menu do Dia",
                init: "Por favor, escolha uma data primeiro.",
                empty: "Desculpe, não há menu disponível para esta data.",
                submit: "Enviar Pedido"
            }
        };

        // 初始化日历组件
        flatpickr("#dining-date", {
            dateFormat: "Y-m-d",
            minDate: "today", // 不允许选过去的日子
            onChange: function(selectedDates, dateStr) {
                if (dateStr) {
                    fetchMenuForDate(dateStr);
                }
            }
        });

        // 切换语言的函数
        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'pt' : 'zh';
            document.getElementById('lang-toggle').innerText = i18n[currentLang].langBtn;
            document.getElementById('page-title').innerText = i18n[currentLang].title;
            document.getElementById('label-name').innerText = i18n[currentLang].name;
            document.getElementById('label-contact').innerText = i18n[currentLang].contact;
            document.getElementById('label-date').innerText = i18n[currentLang].date;
            document.getElementById('menu-title').innerText = i18n[currentLang].menu;
            document.getElementById('btn-submit').innerText = i18n[currentLang].submit;
            
            // 重新渲染当前菜单视图（如果已经加载了数据）
            renderMenu();
        }

        // 根据选定日期前往 Supabase 查询菜品
        async function fetchMenuForDate(dateStr) {
            const menuBox = document.getElementById('menu-box');
            menuBox.innerHTML = currentLang === 'zh' ? '<p>菜单加载中...</p>' : '<p>A carregar o menu...</p>';

            try {
                // 查询 available_days 数组中包含该日期的所有菜品
                let { data, error } = await supabase
                    .from('dishes')
                    .select('*')
                    .contains('available_days', [dateStr]);

                if (error) throw error;

                allDishes = data || [];
                renderMenu();

            } catch (err) {
                console.error("加载菜单失败:", err);
                menuBox.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
            }
        }

        // 渲染菜单的函数
        function renderMenu() {
            const menuBox = document.getElementById('menu-box');
            const dateInput = document.getElementById('dining-date').value;

            if (!dateInput) {
                menuBox.innerHTML = `<p class="no-menu">${i18n[currentLang].init}</p>`;
                return;
            }

            if (allDishes.length === 0) {
                menuBox.innerHTML = `<p class="no-menu">${i18n[currentLang].empty}</p>`;
                return;
            }

            // 清空容器，开始拼装 HTML
            menuBox.innerHTML = '';
            allDishes.forEach(dish => {
                const name = currentLang === 'zh' ? dish.name_zh : dish.name_pt;
                const desc = currentLang === 'zh' ? dish.desc_zh : dish.desc_pt;

                const itemHtml = `
                    <div class="dish-item">
                        <input type="checkbox" name="dish-select" value="${dish.id}" data-name-zh="${dish.name_zh}">
                        <div class="dish-details">
                            <div class="dish-name">${name}</div>
                            ${desc ? `<div class="dish-desc">${desc}</div>` : ''}
                        </div>
                    </div>
                `;
                menuBox.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        // 提交订单的暂留函数（下一节课实现完整写入与提醒）
        function submitOrder() {
            const name = document.getElementById('cust-name').value;
            const contact = document.getElementById('cust-contact').value;
            const date = document.getElementById('dining-date').value;
            
            if(!name || !contact || !date) {
                alert(currentLang === 'zh' ? "请填写完整的姓名、联系方式和日期！" : "Por favor, preencha todos os campos!");
                return;
            }

            // 获取选中的菜品
            const selectedCheckboxes = document.querySelectorAll('input[name="dish-select"]:checked');
            if (selectedCheckboxes.length === 0) {
                alert(currentLang === 'zh' ? "请至少选择一道菜品！" : "Por favor, selecione pelo menos um prato!");
                return;
            }

            let orderedItems = [];
            selectedCheckboxes.forEach(cb => {
                orderedItems.push({
                    dish_id: cb.value,
                    dish_name_zh: cb.getAttribute('data-name-zh')
                });
            });

            // 打包数据
            const orderPayload = {
                customer_name: name,
                contact_info: contact,
                dining_date: date,
                items: orderedItems // 暂存勾选的菜品数组
            };

            console.log("准备提交的订单数据:", orderPayload);
            alert("前端逻辑测试成功！已准备好数据。我们将在下一步将它安全写入数据库并触发 Telegram 提醒。");
        }
    </script>
</body>
</html>
