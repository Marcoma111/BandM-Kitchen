<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BandM Kitchen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        :root {
            --primary-color: #0E2238;   /* 奢华深蓝 */
            --accent-color: #C5A880;    /* 雅致香槟金 */
            --bg-color: #F8F9FA;        /* 清爽底色 */
            --card-bg: #FFFFFF;
            --text-main: #2D3748;
            --text-sub: #718096;
            --radius-lg: 20px;
            --radius-md: 12px;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            font-family: 'Plus Jakarta Sans', 'Noto Serif SC', sans-serif;
            -webkit-tap-highlight-color: transparent; /* 消除移动端点击阴影 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .wrapper {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            box-shadow: 0 10px 30px rgba(14, 34, 56, 0.05);
        }

        /* 头部导航区域 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            border-bottom: 1px solid #EDF2F7;
            padding-bottom: 16px;
        }

        .header-info h2 {
            font-size: 22px;
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-info p {
            font-size: 13px;
            color: var(--text-sub);
        }

        .lang-btn {
            background: #EDF2F7;
            color: var(--primary-color);
            border: none;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* 表单输入区域 */
        .form-section {
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 13px;
            color: var(--primary-color);
        }

        .input-inner {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-inner i {
            position: absolute;
            left: 16px;
            color: var(--accent-color);
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px 12px 44px;
            border: 1.5px solid #E2E8F0;
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--text-main);
            background: #FAFCFF;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            background: #FFFFFF;
        }

        /* 菜单分类展示结构 */
        .category-block {
            margin-bottom: 24px;
        }

        .category-title {
            font-size: 14px;
            font-weight: 700;
            color: #FFFFFF;
            background: var(--primary-color);
            padding: 5px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 菜品选择卡片 */
        .dish-card {
            background: #FFFFFF;
            border: 1.5px solid #E2E8F0;
            border-radius: var(--radius-md);
            padding: 14px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .dish-card.selected {
            border-color: var(--accent-color);
            background: rgba(197, 168, 128, 0.04);
        }

        .checkbox-container {
            margin-right: 14px;
            display: flex;
            align-items: center;
        }

        .dish-card input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            pointer-events: none; /* 让整张卡片统一承载点击事件 */
        }

        .dish-details {
            flex: 1;
        }

        .dish-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 2px;
        }

        .dish-desc {
            font-size: 12px;
            color: var(--text-sub);
            line-height: 1.4;
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: #FFFFFF;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(14, 34, 56, 0.1);
            transition: all 0.2s ease;
        }

        .submit-btn:disabled {
            background: #A0AEC0;
            cursor: not-allowed;
        }

        /* 手机移动端高拟真原生弹窗遮罩 */
        .custom-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(14, 34, 56, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .custom-modal.show {
            opacity: 1; pointer-events: auto;
        }
        .modal-content {
            background: #FFFFFF;
            width: 85%; max-width: 320px;
            padding: 24px;
            border-radius: var(--radius-lg);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .custom-modal.show .modal-content {
            transform: scale(1);
        }
        .modal-icon {
            width: 50px; height: 50px;
            background: #E6FFFA; color: #319795;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; margin: 0 auto 14px;
        }
        .modal-title {
            font-size: 18px; font-weight: 700; color: var(--primary-color); margin-bottom: 8px;
        }
        .modal-text {
            font-size: 13px; color: var(--text-sub); line-height: 1.5; margin-bottom: 20px;
        }
        .modal-btn {
            width: 100%; padding: 12px;
            background: var(--primary-color); color: white;
            border: none; border-radius: var(--radius-md);
            font-size: 14px; font-weight: 600; cursor: pointer;
        }

        .status-msg {
            text-align: center; padding: 30px 0; color: var(--text-sub); font-size: 14px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <div class="header-info">
            <h2 id="text-title">BandM Kitchen 点单</h2>
            <p id="text-subtitle">探索极致风味 · 开启私享点单</p>
        </div>
        <button class="lang-btn" id="btn-lang" onclick="toggleLanguage()">Português</button>
    </div>

    <div class="form-section">
        <div class="form-group">
            <label id="label-name">您的姓名</label>
            <div class="input-inner">
                <i class="fa-regular fa-user"></i>
                <input type="text" id="cust-name" placeholder="请输入您的真实姓名">
            </div>
        </div>

        <div class="form-group">
            <label id="label-contact">联系方式</label>
            <div class="input-inner">
                <i class="fa-brands fa-whatsapp"></i>
                <input type="text" id="cust-contact" placeholder="微信 / 手机号 / WhatsApp">
            </div>
        </div>

        <div class="form-group">
            <label id="label-date">就餐日期</label>
            <div class="input-inner">
                <i class="fa-regular fa-calendar"></i>
                <input type="text" id="dining-date" placeholder="请选择预订日期">
            </div>
        </div>
    </div>

    <div id="categories-container">
        <div class="status-msg"><i class="fas fa-spinner fa-spin"></i> Loading menu...</div>
    </div>

    <button class="submit-btn" id="btn-submit" onclick="submitOrder()">
        提交订单
    </button>
</div>

<div class="custom-modal" id="success-modal">
    <div class="modal-content">
        <div class="modal-icon"><i class="fas fa-check"></i></div>
        <div class="modal-title" id="modal-title-text">提交成功</div>
        <div class="modal-text" id="modal-desc-text">我们将为您精心准备美味佳肴。</div>
        <button class="modal-btn" id="modal-btn-text" onclick="closeModalAndReload()">我知道了</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
    // ==================== [核心数据配置中心] ====================
    const SUPABASE_URL = "https://hxezvumbkwmavphcahcv.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh4ZXp2dW1ia3dtYXZwaGNhaGN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDk4NDgsImV4cCI6MjA5NTAyNTg0OH0.TPEzo0Rf9cjj3muAO9tfx-W3jc54vHFbl20j6U4tbXs"; 
    const PUSHDEER_KEY = "PDU41530TPPT6IuAkywJ0iZXEzw64SI5jGxLjuPw4";
    // ==========================================================

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentLang = 'zh';
    let globalDishes = []; 

    // 严苛语言区隔字典：确保页面绝不混杂
    const i18n = {
        zh: {
            title: "BandM Kitchen 点单", subtitle: "探索极致风味 · 开启私享点单", lang: "Português",
            name: "您的姓名", contact: "联系方式", date: "就餐日期", submit: "提交订单",
            ph_name: "请输入您的真实姓名", ph_contact: "微信 / 手机号 / WhatsApp", ph_date: "请选择预订日期",
            alert_name: "请填写您的姓名！", alert_contact: "请填写您的联系方式！", alert_date: "请选择就餐日期！",
            alert_dish: "请至少勾选一道美味菜品！", submitting: "正在打包提交...", 
            success_title: "订单提交成功", success_desc: "您的菜品已成功预订，我们将为您精心准备美味。", success_btn: "我知道了",
            cat_default: "其他菜品"
        },
        pt: {
            title: "BandM Kitchen", subtitle: "Sabores exclusivos para o seu dia", lang: "中文",
            name: "Seu Nome", contact: "Contacto", date: "Data do Jantar", submit: "Enviar Pedido",
            ph_name: "Ex: Marco", ph_contact: "WeChat / WhatsApp / Telemóvel", ph_date: "Selecione a data...",
            alert_name: "Por favor, introduza o seu nome!", alert_contact: "Por favor, introduza o seu contacto!", alert_date: "Por favor, escolha a data!",
            alert_dish: "Selecione pelo menos um prato do menu!", submitting: "A enviar...", 
            success_title: "Pedido Enviado", success_desc: "O seu pedido foi registado com sucesso. Estaremos prontos para o servir.", success_btn: "Confirmar",
            cat_default: "Outros Pratos"
        }
    };

    // 基于数据库真正 category 值的纯净中葡分类名转换映射
    const categoryMapping = {
        zh: { "SOPAS": "汤类", "CARNES": "肉类", "MARISCOS": "海鲜", "SALTEADOS": "小炒", "CHURRASCO": "烤制", "ACOMPANHAMENTOS": "主食", "SOBREMESAS": "甜点" },
        pt: { "SOPAS": "SOPAS", "CARNES": "CARNES", "MARISCOS": "MARISCOS", "SALTEADOS": "SALTEADOS", "CHURRASCO": "CHURRASCO", "ACOMPANHAMENTOS": "ACOMPANHAMENTOS", "SOBREMESAS": "SOBREMESAS" }
    };

    // 菜单品类的精美展示排序规则
    const categoryOrder = ["SOPAS", "CARNES", "MARISCOS", "SALTEADOS", "CHURRASCO", "ACOMPANHAMENTOS", "SOBREMESAS"];

    flatpickr("#dining-date", { dateFormat: "Y-m-d", minDate: "today" });

    function toggleLanguage() {
        currentLang = currentLang === 'zh' ? 'pt' : 'zh';
        document.getElementById('btn-lang').innerText = i18n[currentLang].lang;
        document.getElementById('text-title').innerText = i18n[currentLang].title;
        document.getElementById('text-subtitle').innerText = i18n[currentLang].subtitle;
        
        document.getElementById('label-name').innerText = i18n[currentLang].name;
        document.getElementById('cust-name').placeholder = i18n[currentLang].ph_name;
        
        document.getElementById('label-contact').innerText = i18n[currentLang].contact;
        document.getElementById('cust-contact').placeholder = i18n[currentLang].ph_contact;
        
        document.getElementById('label-date').innerText = i18n[currentLang].date;
        document.getElementById('dining-date').placeholder = i18n[currentLang].ph_date;
        
        document.getElementById('btn-submit').innerText = i18n[currentLang].submit;
        renderCategorizedMenu();
    }

    async function loadAllDishes() {
        try {
            // 直接读取经过真正清洗入库的 category 列
            let { data, error } = await db.from('dishes').select('*');
            if (error) throw error;
            globalDishes = data || [];
            renderCategorizedMenu();
        } catch (err) {
            console.error(err);
            document.getElementById('categories-container').innerHTML = `<div class="status-msg" style="color:red;">Error: ${err.message}</div>`;
        }
    }

    function renderCategorizedMenu() {
        const container = document.getElementById('categories-container');
        if (globalDishes.length === 0) {
            container.innerHTML = `<div class="status-msg">${currentLang === 'zh' ? '菜单空空如也' : 'Sem pratos disponíveis'}</div>`;
            return;
        }

        // 初始化品类分流桶
        const groups = {};
        categoryOrder.forEach(cat => groups[cat] = []);
        const unclassifiedKey = "OTHER";
        groups[unclassifiedKey] = [];

        // 精准利用数据库 category 列进行物理分组
        globalDishes.forEach(dish => {
            const dbCat = dish.category ? dish.category.toUpperCase().trim() : unclassifiedKey;
            if (groups[dbCat]) {
                groups[dbCat].push(dish);
            } else {
                if (!groups[dbCat]) groups[dbCat] = [];
                groups[dbCat].push(dish);
            }
        });

        container.innerHTML = '';

        // 合并排序链，确保规范且具备健壮的容错性
        const allKeys = [...categoryOrder, ...Object.keys(groups).filter(k => !categoryOrder.includes(k))];

        allKeys.forEach(catKey => {
            const dishes = groups[catKey];
            if (!dishes || dishes.length === 0) return;

            // 彻底语言隔绝：防止分类出现中葡双拼
            const groupTitle = categoryMapping[currentLang][catKey] || i18n[currentLang].cat_default;

            let dishesHtml = '';
            dishes.forEach(dish => {
                const name = currentLang === 'zh' ? dish.name_zh : dish.name_pt;
                const desc = currentLang === 'zh' ? dish.desc_zh : dish.desc_pt;

                dishesHtml += `
                    <div class="dish-card" onclick="selectDishCard(this)">
                        <div class="checkbox-container">
                            <input type="checkbox" name="dish-checkbox" value="${dish.id}" data-zh="${dish.name_zh}" data-pt="${dish.name_pt}">
                        </div>
                        <div class="dish-details">
                            <div class="dish-name">${name}</div>
                            ${desc ? `<div class="dish-desc">${desc}</div>` : ''}
                        </div>
                    </div>
                `;
            });

            const blockHtml = `
                <div class="category-block">
                    <div class="category-title">${groupTitle}</div>
                    <div class="menu-list">${dishesHtml}</div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', blockHtml);
        });
    }

    function selectDishCard(cardElement) {
        const checkbox = cardElement.querySelector('input[type="checkbox"]');
        checkbox.checked = !checkbox.checked;
        if (checkbox.checked) {
            cardElement.classList.add('selected');
        } else {
            cardElement.classList.remove('selected');
        }
    }

    async function submitOrder() {
        const name = document.getElementById('cust-name').value.trim();
        const contact = document.getElementById('cust-contact').value.trim();
        const date = document.getElementById('dining-date').value;
        const submitBtn = document.getElementById('btn-submit');

        if (!name) { alert(i18n[currentLang].alert_name); return; }
        if (!contact) { alert(i18n[currentLang].alert_contact); return; }
        if (!date) { alert(i18n[currentLang].alert_date); return; }

        const checkedBoxes = document.querySelectorAll('input[name="dish-checkbox"]:checked');
        if (checkedBoxes.length === 0) { alert(i18n[currentLang].alert_dish); return; }

        submitBtn.disabled = true;
        submitBtn.innerText = i18n[currentLang].submitting;

        // 订单明细：完美记录每名客户预订的具体菜品细节数据
        let dbItems = [];
        let notifyText = "";

        checkedBoxes.forEach((cb, index) => {
            const zhName = cb.getAttribute('data-zh');
            const ptName = cb.getAttribute('data-pt');
            dbItems.push({ 
                dish_id: cb.value, 
                name_zh: zhName, 
                name_pt: ptName 
            });
            notifyText += `${index + 1}. ${zhName} (${ptName})\n`;
        });

        try {
            # 1. 结构化 JSON 存入 orders 表的 items 字段中进行记录沉淀
            const { error } = await db.from('orders').insert([
                { customer_name: name, contact_info: contact, dining_date: date, items: dbItems }
            ]);
            if (error) throw error;

            # 2. 静默推送至 PushDeer
            const msgContent = `🚨 BandM Kitchen 新订单提醒 🚨\n\n` +
                               `👤 顾客姓名: ${name}\n` +
                               `📞 联系方式: ${contact}\n` +
                               `📅 就餐日期: ${date}\n` +
                               `🍳 预订菜品:\n${notifyText}`;

            await fetch(`https://api2.pushdeer.com/message/push?pushkey=${PUSHDEER_KEY}&text=${encodeURIComponent(msgContent)}`, {
                mode: 'no-cors'
            });

            # 3. 呼出手机端完美适配的沉浸式高级弹窗
            document.getElementById('modal-title-text').innerText = i18n[currentLang].success_title;
            document.getElementById('modal-desc-text').innerText = i18n[currentLang].success_desc;
            document.getElementById('modal-btn-text').innerText = i18n[currentLang].success_btn;
            
            document.getElementById('success-modal').classList.add('show');

        } catch (err) {
            console.error(err);
            alert("Falha / 提交失败: " + err.message);
            submitBtn.disabled = false;
            submitBtn.innerText = i18n[currentLang].submit;
        }
    }

    function closeModalAndReload() {
        document.getElementById('success-modal').classList.remove('show');
        location.reload();
    }

    window.onload = loadAllDishes;
</script>
</body>
</html>
