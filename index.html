<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BandM Kitchen</title>
    <style>
        :root {
            --primary-color: #0E2238;   /* 奢华深蓝 */
            --accent-color: #C5A880;    /* 雅致香槟金 */
            --bg-color: #F8F9FA;        /* 清爽底色 */
            --card-bg: #FFFFFF;
            --text-sub: #718096;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 12px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 24px;
            box-shadow: 0 10px 30px rgba(14, 34, 56, 0.05);
            text-align: center;
        }

        header {
            margin-bottom: 32px;
        }

        h1 { 
            color: var(--primary-color); 
            font-size: 26px; 
            font-weight: 700; 
            letter-spacing: 0.5px;
        }

        .subtitle { 
            color: var(--text-sub); 
            font-size: 14px; 
margin-top: 6px; 
            line-height: 1.5;
        }

        .nav-btn {
            display: block;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(14, 34, 56, 0.1);
            transition: all 0.2s ease;
        }

        .nav-btn:active { 
            transform: scale(0.97); 
            background: #163252;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>BandM Kitchen</h1>
        <p class="subtitle">Sabores exclusivos<br>开启您的专属私享点单</p>
    </header>

    <a href="https://marcoma111.github.io/BandM-Kitchen/order.html" class="nav-btn">
        Entrar no Menu / 进入点菜系统
    </a>
</div>

</body>
</html>
